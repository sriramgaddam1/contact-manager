!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .form-section h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-add {
            background: #667eea;
            color: white;
            grid-column: 1 / -1;
        }

        .btn-add:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-search {
            background: #48bb78;
            color: white;
        }

        .btn-search:hover {
            background: #38a169;
        }

        .btn-clear {
            background: #f6ad55;
            color: white;
        }

        .btn-clear:hover {
            background: #ed8936;
        }

        .search-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 150px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .contact-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .contact-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .contact-id {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .contact-details {
            padding: 20px;
            flex: 1;
        }

        .detail-row {
            margin-bottom: 15px;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .detail-value {
            color: #333;
            font-size: 0.95rem;
            word-break: break-all;
        }

        .contact-actions {
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-edit {
            background: #48bb78;
            color: white;
            padding: 10px 15px;
            font-size: 0.9rem;
            flex: 1;
        }

        .btn-edit:hover {
            background: #38a169;
        }

        .btn-delete {
            background: #f56565;
            color: white;
            padding: 10px 15px;
            font-size: 0.9rem;
            flex: 1;
        }

        .btn-delete:hover {
            background: #e53e3e;
        }

        .no-contacts {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .modal-group {
            display: flex;
            flex-direction: column;
        }

        .modal-group.full {
            grid-column: 1 / -1;
        }

        .modal-group label {
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .modal-group input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 0.95rem;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .btn-save {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-save:hover {
            background: #5568d3;
        }

        .btn-cancel {
            background: #cbd5e0;
            color: #333;
            flex: 1;
        }

        .btn-cancel:hover {
            background: #a0aec0;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .form-section {
                padding: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .contacts-grid {
                grid-template-columns: 1fr;
            }

            .contact-header {
                padding: 15px;
            }

            .contact-details {
                padding: 15px;
            }

            .contact-actions {
                padding: 0 15px 15px;
            }

            .modal-content {
                padding: 20px;
            }

            .modal-grid {
                grid-template-columns: 1fr;
            }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📇 Contact Manager</h1>
            <p>Manage your contacts efficiently</p>
        </div>

        <div class="form-section">
            <div id="alert" class="alert"></div>
            
            <h2>Add New Contact</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" id="firstName" placeholder="John">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phoneNumber" placeholder="1234567890">
                </div>
            </div>
            <div class="button-group">
                <button class="btn-add" onclick="addContact()">Add Contact</button>
            </div>

            <h2 style="margin-top: 30px; margin-bottom: 20px;">Search Contacts</h2>
            <div class="search-section">
                <input type="text" id="searchFirstName" class="search-input" placeholder="Search by first name...">
                <button class="btn-search" onclick="searchByFirstName()">Search First</button>
            </div>
            <div class="search-section" style="margin-top: 10px;">
                <input type="text" id="searchLastName" class="search-input" placeholder="Search by last name...">
                <button class="btn-search" onclick="searchByLastName()">Search Last</button>
            </div>
            <div class="search-section" style="margin-top: 10px;">
                <input type="text" id="searchEmail" class="search-input" placeholder="Search by email...">
                <button class="btn-search" onclick="searchByEmail()">Search Email</button>
            </div>
            <div style="margin-top: 15px;">
                <button class="btn-clear" onclick="loadAllContacts()">Clear & View All</button>
            </div>
        </div>

        <div id="contactsList" class="contacts-grid"></div>
        <div id="noContacts" class="no-contacts">No contacts found. Add one to get started!</div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Edit Contact</div>
            <div class="modal-grid">
                <div class="modal-group full">
                    <label>First Name *</label>
                    <input type="text" id="editFirstName">
                </div>
                <div class="modal-group full">
                    <label>Last Name</label>
                    <input type="text" id="editLastName">
                </div>
                <div class="modal-group full">
                    <label>Email</label>
                    <input type="email" id="editEmail">
                </div>
                <div class="modal-group full">
                    <label>Phone Number *</label>
                    <input type="tel" id="editPhoneNumber">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-save" onclick="saveEdit()">Save</button>
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api/contacts';
        let editingContactId = null;

        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }

        async function addContact() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();

            if (!firstName || !phoneNumber) {
                showAlert('First name and phone number are required!', 'error');
                return;
            }

            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, phoneNumber })
                });

                if (response.ok) {
                    showAlert('Contact added successfully!', 'success');
                    document.getElementById('firstName').value = '';
                    document.getElementById('lastName').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('phoneNumber').value = '';
                    loadAllContacts();
                } else {
                    showAlert('Failed to add contact', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function loadAllContacts() {
            try {
                const response = await fetch(API_BASE_URL);
                const contacts = await response.json();
                displayContacts(contacts);
            } catch (error) {
                showAlert('Error loading contacts: ' + error.message, 'error');
            }
        }

        async function searchByFirstName() {
            const firstName = document.getElementById('searchFirstName').value.trim();
            if (!firstName) {
                showAlert('Please enter a first name to search', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/search/firstName?firstName=${firstName}`);
                const contacts = await response.json();
                displayContacts(contacts);
            } catch (error) {
                showAlert('Error searching contacts: ' + error.message, 'error');
            }
        }

        async function searchByLastName() {
            const lastName = document.getElementById('searchLastName').value.trim();
            if (!lastName) {
                showAlert('Please enter a last name to search', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/search/lastName?lastName=${lastName}`);
                const contacts = await response.json();
                displayContacts(contacts);
            } catch (error) {
                showAlert('Error searching contacts: ' + error.message, 'error');
            }
        }

        async function searchByEmail() {
            const email = document.getElementById('searchEmail').value.trim();
            if (!email) {
                showAlert('Please enter an email to search', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/search/email?email=${email}`);
                const contacts = await response.json();
                displayContacts(contacts);
            } catch (error) {
                showAlert('Error searching contacts: ' + error.message, 'error');
            }
        }

        function displayContacts(contacts) {
            const contactsList = document.getElementById('contactsList');
            const noContacts = document.getElementById('noContacts');

            if (!Array.isArray(contacts) || contacts.length === 0) {
                contactsList.innerHTML = '';
                noContacts.style.display = 'block';
                return;
            }

            noContacts.style.display = 'none';
            contactsList.innerHTML = contacts.map(contact => `
                <div class="contact-card">
                    <div class="contact-header">
                        <div class="avatar">${getInitials(contact.firstName, contact.lastName)}</div>
                        <div class="contact-info">
                            <div class="contact-name">${contact.firstName} ${contact.lastName || ''}</div>
                            <div class="contact-id">ID #${contact.id}</div>
                        </div>
                    </div>
                    <div class="contact-details">
                        <div class="detail-row">
                            <div class="detail-label">Email</div>
                            <div class="detail-value">${contact.email || 'N/A'}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Phone</div>
                            <div class="detail-value">${contact.phoneNumber}</div>
                        </div>
                    </div>
                    <div class="contact-actions">
                        <button class="btn-edit" onclick="openEditModal(${contact.id}, '${contact.firstName}', '${contact.lastName || ''}', '${contact.email || ''}', '${contact.phoneNumber}')">Edit</button>
                        <button class="btn-delete" onclick="deleteContact(${contact.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function getInitials(firstName, lastName) {
            return `${firstName?.charAt(0) || ''}${lastName?.charAt(0) || ''}`.toUpperCase();
        }

        function openEditModal(id, firstName, lastName, email, phoneNumber) {
            editingContactId = id;
            document.getElementById('editFirstName').value = firstName;
            document.getElementById('editLastName').value = lastName;
            document.getElementById('editEmail').value = email;
            document.getElementById('editPhoneNumber').value = phoneNumber;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingContactId = null;
        }

        async function saveEdit() {
            const firstName = document.getElementById('editFirstName').value.trim();
            const phoneNumber = document.getElementById('editPhoneNumber').value.trim();

            if (!firstName || !phoneNumber) {
                showAlert('First name and phone number are required!', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/${editingContactId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        firstName,
                        lastName: document.getElementById('editLastName').value.trim(),
                        email: document.getElementById('editEmail').value.trim(),
                        phoneNumber
                    })
                });

                if (response.ok) {
                    showAlert('Contact updated successfully!', 'success');
                    closeEditModal();
                    loadAllContacts();
                } else {
                    showAlert('Failed to update contact', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function deleteContact(id) {
            if (!confirm('Are you sure you want to delete this contact?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showAlert('Contact deleted successfully!', 'success');
                    loadAllContacts();
                } else {
                    showAlert('Failed to delete contact', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') closeEditModal();
        });

        loadAllContacts();
    </script>
</body>
</html>
